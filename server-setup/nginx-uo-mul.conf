# /etc/nginx/sites-available/uo-mul
# Sirve los .mul del patcher en :8080.
#
# Setup en la VM (una vez):
#   sudo apt install nginx -y
#   sudo cp nginx-uo-mul.conf /etc/nginx/sites-available/uo-mul
#   sudo ln -s /etc/nginx/sites-available/uo-mul /etc/nginx/sites-enabled/
#   sudo nginx -t   # verifica config
#   sudo systemctl reload nginx
#   sudo ufw allow 8080/tcp   # si tienes firewall
#
# Tras esto:
#   http://134.255.219.238:8080/manifest.json
#   http://134.255.219.238:8080/files/map0.mul

server {
    listen 8080;
    listen [::]:8080;

    server_name _;

    root /srv/uo-mul;

    # No directory listing — solo archivos directos
    autoindex off;

    location = /manifest.json {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /manifest.json =404;
    }

    location /files/ {
        add_header Cache-Control "no-cache, must-revalidate";
        # Permitir descargas grandes
        client_max_body_size 0;
        try_files $uri =404;
    }

    # Resto bloqueado
    location / {
        return 403;
    }

    # Logs
    access_log /var/log/nginx/uo-mul-access.log;
    error_log  /var/log/nginx/uo-mul-error.log warn;
}
